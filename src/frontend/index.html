<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plataforma de Trazabilidad Educativa</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body class="bg-soft">

  <div class="container min-vh-100 d-flex align-items-center justify-content-center">
    <div class="row w-100 justify-content-center">
      <div class="col-12 col-md-10 col-lg-8">
        <div class="card shadow-lg p-4 p-md-5">
          <div class="row align-items-center g-4">
            
            <div class="col-12 col-md-6 text-center">
              <img
                src="./images/logo2azul.png"
                alt="Aulas Amigas"
                class="img-fluid mb-4"
                style="max-width: 260px;"
              />
              <h1 class="h3 text-brand fw-bold">Plataforma de Trazabilidad Educativa</h1>
              <p class="text-muted mt-3 mb-0">
                Gestión de proyectos, docentes, formación, asistencias, encuestas y certificación.
              </p>
            </div>

            <div class="col-12 col-md-6">
              <h2 class="h4 mb-4 text-brand fw-bold text-center">Iniciar sesión</h2>

              <form id="loginForm">
                <div class="mb-3">
                  <label for="email" class="form-label">Correo electrónico</label>
                  <input
                    type="email"
                    class="form-control"
                    id="email"
                    placeholder="nombre@correo.com"
                    required
                  />
                </div>

                <div class="mb-3">
                  <label for="password" class="form-label">Contraseña</label>
                  <input
                    type="password"
                    class="form-control"
                    id="password"
                    placeholder="********"
                    required
                  />
                </div>

                <div id="mensaje" class="small mb-3 text-danger"></div>

                <button type="submit" class="btn btn-primary w-100">
                  Ingresar
                </button>
              </form>
            </div>

          </div>
        </div>

        <p class="text-center small mt-3 mb-0" style="color: var(--color-dark);">
          © Aulas Amigas - Plataforma de Trazabilidad
        </p>
      </div>
    </div>
  </div>

  <script src="./js/auth.js"></script>
</body>
</html>
