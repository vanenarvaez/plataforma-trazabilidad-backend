<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Usuarios</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>

  <nav class="navbar px-4 py-3" style="background-color: var(--color-primary);">
  <div class="d-flex align-items-center gap-3">
    <img
      src="../images/logo1morado.png"
      alt="Aulas Amigas"
      style="height:55px; object-fit: contain;"
    />
    <span class="text-white fw-bold">Plataforma de Trazabilidad</span>
  </div>

  <div class="d-flex align-items-center gap-3">
    <div class="text-white text-end me-3">
      <div id="nombreUsuario" class="fw-semibold"></div>
      <small id="rolUsuario"></small>
    </div>

    <button class="btn btn-light btn-sm" onclick="logout()">Cerrar sesión</button>
  </div>
</nav>

  <div class="d-flex">

    <div class="p-3" style="width: 250px; background: var(--color-gray); min-height: 100vh;">
  <h6 class="text-brand fw-bold mb-3">Menú</h6>

  <a href="dashboard.html" class="sidebar-link" data-roles="admin,director,pedagogico,formador,comercial">Dashboard</a>
  <a href="usuarios.html" class="sidebar-link" data-roles="admin">Usuarios</a>
  <a href="proyectos.html" class="sidebar-link" data-roles="admin,director">Proyectos</a>
  <a href="instituciones.html" class="sidebar-link" data-roles="admin,director,pedagogico">Instituciones</a>
  <a href="docentes.html" class="sidebar-link" data-roles="admin,director,pedagogico,formador">Docentes</a>
  <a href="asistencias.html" class="sidebar-link" data-roles="admin,director,pedagogico,formador">Asistencias</a>
  <a href="encuestas.html" class="sidebar-link" data-roles="admin,director,pedagogico,formador">Encuestas</a>
</div>

    <div class="p-4 w-100">
      <h2 class="text-brand fw-bold mb-4">Gestión de usuarios</h2>

      <div class="row g-4 mb-4">
        <div class="col-lg-5">
          <div class="card shadow-sm p-4 h-100">
            <h5 class="mb-3 text-brand">Registrar usuario</h5>

            <form id="usuarioForm" class="row g-3">
              <input type="hidden" id="usuarioIdEdicion" />

              <div class="col-md-6">
                <label class="form-label">Nombres</label>
                <input type="text" id="nombres" class="form-control" required />
              </div>

              <div class="col-md-6">
                <label class="form-label">Apellidos</label>
                <input type="text" id="apellidos" class="form-control" required />
              </div>

              <div class="col-md-12">
                <label class="form-label">Correo</label>
                <input type="email" id="email" class="form-control" required />
              </div>

              <div class="col-md-6">
                <label class="form-label">Contraseña temporal</label>
                <input type="text" id="password" class="form-control" required />
              </div>

              <div class="col-md-6">
                <label class="form-label">Rol</label>
                <select id="rol" class="form-select" required>
                  <option value="">Seleccione un rol</option>
                  <option value="admin">Administrador</option>
                  <option value="director">Director de proyectos</option>
                  <option value="pedagogico">Líder pedagógico</option>
                  <option value="formador">Formador</option>
                  <option value="comercial">Comercial</option>
                </select>
              </div>

              <div class="col-md-4 d-flex align-items-end">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="activo" checked />
                  <label class="form-check-label" for="activo">Activo</label>
                </div>
              </div>

              <div class="col-12">
                <div id="mensajeUsuario" class="small"></div>
              </div>

              <div class="col-12 d-flex gap-2">
                <button type="submit" class="btn btn-primary">Guardar usuario</button>
                <button type="button" id="btnCancelarEdicion" class="btn btn-secondary">Cancelar edición</button>
              </div>
            </form>
          </div>
        </div>

        <div class="col-lg-7">
          <div class="card shadow-sm p-4 h-100">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
              <h5 class="mb-0 text-brand">Listado de usuarios</h5>
            </div>

            <div class="row g-3 mb-3">
              <div class="col-md-4">
                <label class="form-label">Buscar</label>
                <input
                  type="text"
                  id="buscadorUsuarios"
                  class="form-control"
                  placeholder="Nombre o correo"
                />
              </div>

              <div class="col-md-4">
                <label class="form-label">Rol</label>
                <select id="filtroRolUsuarios" class="form-select">
                  <option value="">Todos</option>
                  <option value="admin">Administrador</option>
                  <option value="director">Director</option>
                  <option value="pedagogico">Pedagógico</option>
                  <option value="formador">Formador</option>
                  <option value="comercial">Comercial</option>
                </select>
              </div>

              <div class="col-md-4">
                <label class="form-label">Estado</label>
                <select id="filtroEstadoUsuarios" class="form-select">
                  <option value="">Todos</option>
                  <option value="activos">Activos</option>
                  <option value="inactivos">Inactivos</option>
                </select>
              </div>
            </div>

            <div class="table-responsive">
  <table class="table table-bordered table-hover align-middle">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Correo</th>
        <th>Rol</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tablaUsuarios">
      <tr>
        <td colspan="5" class="text-center">Cargando usuarios...</td>
      </tr>
    </tbody>
  </table>
</div>
</div>
</div>
</div>

<div
  class="modal fade"
  id="modalPassword"
  tabindex="-1"
  aria-labelledby="modalPasswordLabel"
  aria-hidden="true"
>
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalPasswordLabel">Resetear contraseña</h5>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
          aria-label="Cerrar"
        ></button>
      </div>

      <div class="modal-body">
        <label class="form-label">Nueva contraseña</label>
        <input
          type="password"
          id="nuevaPassword"
          class="form-control"
          placeholder="Ingrese la nueva contraseña"
        />
        <div class="form-text">
          La nueva contraseña debe tener al menos 4 caracteres.
        </div>
      </div>

      <div class="modal-footer">
        <button
          type="button"
          class="btn btn-outline-secondary"
          data-bs-dismiss="modal"
        >
          Cancelar
        </button>
        <button
          type="button"
          class="btn btn-primary"
          onclick="guardarNuevaPassword()"
        >
          Guardar
        </button>
      </div>
    </div>
  </div>
</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/layout.js"></script>
<script src="../js/usuarios.js"></script>
<script>
  aplicarPermisosPorRol();
</script>
</body>
</html>
