<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asistencias</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>

  <nav class="navbar px-4 py-3" style="background-color: var(--color-primary);">
    <div class="d-flex align-items-center gap-3">
      <img
        src="../images/logo1morado.png"
        alt="Aulas Amigas"
        style="height:55px; object-fit: contain;"
      />
      <span class="text-white fw-bold">Plataforma de Trazabilidad</span>
    </div>

    <div class="d-flex align-items-center gap-3">
      <div class="text-white text-end me-3">
        <div id="nombreUsuario" class="fw-semibold"></div>
        <small id="rolUsuario"></small>
      </div>
      <button class="btn btn-light btn-sm" onclick="logout()">Cerrar sesión</button>
    </div>
  </nav>

  <div class="d-flex">
    <div class="p-3" style="width: 250px; background: var(--color-gray); min-height: 100vh;">
      <h6 class="text-brand fw-bold mb-3">Menú</h6>

      <a href="dashboard.html" class="sidebar-link" data-roles="admin,director,docente">Dashboard</a>
      <a href="proyectos.html" class="sidebar-link" data-roles="admin,director">Proyectos</a>
      <a href="instituciones.html" class="sidebar-link" data-roles="admin,director">Instituciones</a>
      <a href="docentes.html" class="sidebar-link" data-roles="admin,director">Docentes</a>
      <a href="asistencias.html" class="sidebar-link active" data-roles="admin,director,docente">Asistencias</a>
      <a href="encuestas.html" class="sidebar-link" data-roles="admin,director,docente">Encuestas</a>
    </div>

    <div class="p-4 w-100">
      <h2 class="text-brand fw-bold mb-4">Gestión de asistencias</h2>

      <div class="card shadow-sm p-4 mb-4">
        <h5 class="mb-3 text-brand">Registrar asistencia</h5>

        <form id="asistenciaForm" class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Formación asociada a proyecto</label>
            <select id="proyectoCursoId" class="form-select" required>
              <option value="">Cargando relaciones curso-proyecto...</option>
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label">Docente</label>
            <select id="docenteId" class="form-select" required>
              <option value="">Cargando docentes...</option>
            </select>
          </div>

          <div class="col-md-3">
            <label class="form-label">Número de módulo</label>
            <input type="number" id="moduloNumero" class="form-control" min="1" required />
          </div>

          <div class="col-md-3 d-flex align-items-end">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="asistio" checked />
              <label class="form-check-label" for="asistio">Asistió</label>
            </div>
          </div>

          <div class="col-12">
            <div id="mensajeAsistencia" class="small"></div>
          </div>

          <div class="col-12">
            <button type="submit" class="btn btn-primary">Guardar asistencia</button>
          </div>
        </form>
      </div>

      <div class="card shadow-sm p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h5 class="mb-0 text-brand">Listado de asistencias</h5>
          <button class="btn btn-secondary btn-sm" id="btnRecargarAsistencias">
            Recargar
          </button>
        </div>

        <div class="table-responsive">
          <table class="table table-bordered table-hover align-middle">
            <thead>
              <tr>
                <th>Docente</th>
                <th>Documento</th>
                <th>Proyecto-Curso</th>
                <th>Módulo</th>
                <th>Asistió</th>
                <th>Fecha</th>
              </tr>
            </thead>
            <tbody id="tablaAsistencias">
              <tr>
                <td colspan="6" class="text-center">Cargando asistencias...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts al final -->
  <script src="../js/layout.js"></script>
  <script src="../js/asistencias.js"></script>
  <script>
    aplicarPermisosPorRol();
  </script>
</body>
</html>
