<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instituciones</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>

  <nav class="navbar px-4 py-3" style="background-color: var(--color-primary);">
    <div class="d-flex align-items-center gap-3">
      <img
        src="../images/logo1morado.png"
        alt="Aulas Amigas"
        style="height:55px; object-fit: contain;"
      />
      <span class="text-white fw-bold">Plataforma de Trazabilidad</span>
    </div>

    <div class="d-flex align-items-center gap-3">
      <div class="text-white text-end me-3">
        <div id="nombreUsuario" class="fw-semibold"></div>
        <small id="rolUsuario"></small>
      </div>
      <button class="btn btn-light btn-sm" onclick="logout()">Cerrar sesión</button>
    </div>
  </nav>

  <div class="d-flex">
    <div class="p-3" style="width: 250px; background: var(--color-gray); min-height: 100vh;">
      <h6 class="text-brand fw-bold mb-3">Menú</h6>

      <a href="dashboard.html" class="sidebar-link" data-roles="admin,director,docente">Dashboard</a>
      <a href="proyectos.html" class="sidebar-link" data-roles="admin,director">Proyectos</a>
      <a href="instituciones.html" class="sidebar-link active" data-roles="admin,director">Instituciones</a>
      <a href="docentes.html" class="sidebar-link" data-roles="admin,director">Docentes</a>
      <a href="asistencias.html" class="sidebar-link" data-roles="admin,director,docente">Asistencias</a>
      <a href="encuestas.html" class="sidebar-link" data-roles="admin,director,docente">Encuestas</a>
    </div>

    <div class="p-4 w-100">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-brand fw-bold mb-0">Gestión de instituciones</h2>
      </div>

      <div class="card shadow-sm p-4 mb-4">
        <h5 class="mb-3 text-brand">Registrar institución</h5>

        <form id="institucionForm" class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Nombre de la institución</label>
            <input type="text" id="nombre" class="form-control" required />
          </div>

          <div class="col-md-6">
            <label class="form-label">Código DANE</label>
            <input type="text" id="codigoDane" class="form-control" />
          </div>

          <div class="col-md-4">
            <label class="form-label">Departamento</label>
            <input type="text" id="departamento" class="form-control" />
          </div>

          <div class="col-md-4">
            <label class="form-label">Municipio</label>
            <input type="text" id="municipio" class="form-control" />
          </div>

          <div class="col-md-2">
            <label class="form-label">Zona</label>
            <select id="zona" class="form-select">
              <option value="urbana">Urbana</option>
              <option value="rural">Rural</option>
            </select>
          </div>

          <div class="col-md-2">
            <label class="form-label">Sector</label>
            <select id="sector" class="form-select">
              <option value="oficial">Oficial</option>
              <option value="privado">Privado</option>
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label">Proyecto asociado</label>
            <select id="proyectoId" class="form-select" required>
              <option value="">Cargando proyectos...</option>
            </select>
          </div>

          <div class="col-12">
            <div id="mensajeInstitucion" class="small"></div>
          </div>

          <div class="col-12">
            <button type="submit" class="btn btn-primary">Guardar institución</button>
          </div>
        </form>
      </div>

      <div class="card shadow-sm p-4">
        <h5 class="mb-3 text-brand">Listado de instituciones</h5>

        <div class="table-responsive">
          <table class="table table-bordered table-hover align-middle">
            <thead>
              <tr>
                <th>Nombre</th>
                <th>Código DANE</th>
                <th>Departamento</th>
                <th>Municipio</th>
                <th>Zona</th>
                <th>Sector</th>
                <th>Proyecto</th>
              </tr>
            </thead>
            <tbody id="tablaInstituciones">
              <tr>
                <td colspan="7" class="text-center">Cargando instituciones...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts SIEMPRE al final -->
  <script src="../js/layout.js"></script>
  <script src="../js/instituciones.js"></script>
  <script>
    aplicarPermisosPorRol();
  </script>
</body>
</html>
