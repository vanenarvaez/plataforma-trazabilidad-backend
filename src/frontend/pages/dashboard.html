<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar px-4 py-3" style="background-color: var(--color-primary);">
    <div class="d-flex align-items-center gap-3">
      <img src="../images/logo5blanco.png" style="height:95px;" />
      <span class="text-white fw-bold">Plataforma de Trazabilidad</span>
    </div>

    <button class="btn btn-light btn-sm" onclick="logout()">Cerrar sesión</button>
  </nav>

  <div class="d-flex">

    <!-- SIDEBAR -->
    <div class="p-3" style="width: 250px; background: var(--color-gray); min-height: 100vh;">
      <h6 class="text-brand fw-bold mb-3 text-center">Menú</h6>

      <a href="#" class="sidebar-link">Dashboard</a>
      <a href="proyectos.html" class="sidebar-link">Proyectos</a>
      <a href="instituciones.html" class="sidebar-link">Instituciones</a>
      <a href="docentes.html" class="sidebar-link">Docentes</a>
      <a href="asistencias.html" class="sidebar-link">Asistencias</a>
      <a href="encuestas.html" class="sidebar-link">Encuestas</a>
    </div>

    <!-- CONTENIDO -->
    <div class="p-4 w-100">

      <h2 class="text-brand fw-bold mb-4">Bienvenido</h2>

      <div class="row g-4">

        <div class="col-md-3">
          <div class="card p-3 shadow-sm">
            <h6>Proyectos</h6>
            <h3 id="totalProyectos">0</h3>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card p-3 shadow-sm">
            <h6>Docentes</h6>
            <h3 id="totalDocentes">0</h3>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card p-3 shadow-sm">
            <h6>Instituciones</h6>
            <h3 id="totalInstituciones">0</h3>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card p-3 shadow-sm">
            <h6>Asistencias</h6>
            <h3 id="totalAsistencias">0</h3>
          </div>
        </div>

      </div>

    </div>

  </div>

  <script src="../js/dashboard.js"></script>
</body>
</html>
