<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proyectos</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>

  <nav class="navbar px-4 py-3" style="background-color: var(--color-primary);">
    <div class="d-flex align-items-center gap-3">
      <img
        src="../images/logo1morado.png"
        alt="Aulas Amigas"
        style="height:55px; object-fit: contain;"
      />
      <span class="text-white fw-bold">Plataforma de Trazabilidad</span>
    </div>

    <button class="btn btn-light btn-sm" onclick="logout()">Cerrar sesión</button>
  </nav>

  <div class="d-flex">
    <div class="p-3" style="width: 250px; background: var(--color-gray); min-height: 100vh;">
      <h6 class="text-brand fw-bold mb-3">Menú</h6>

      <a href="dashboard.html" class="sidebar-link">Dashboard</a>
      <a href="proyectos.html" class="sidebar-link active">Proyectos</a>
      <a href="instituciones.html" class="sidebar-link">Instituciones</a>
      <a href="docentes.html" class="sidebar-link">Docentes</a>
      <a href="asistencias.html" class="sidebar-link">Asistencias</a>
      <a href="encuestas.html" class="sidebar-link">Encuestas</a>
    </div>

    <div class="p-4 w-100">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-brand fw-bold mb-0">Gestión de proyectos</h2>
      </div>

      <div class="card shadow-sm p-4 mb-4">
        <h5 class="mb-3 text-brand">Registrar proyecto</h5>

        <form id="proyectoForm" class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Nombre del proyecto</label>
            <input type="text" id="nombre" class="form-control" required />
          </div>

          <div class="col-md-6">
            <label class="form-label">Fuente de financiación</label>
            <input type="text" id="fuenteFinanciacion" class="form-control" />
          </div>

          <div class="col-md-6">
            <label class="form-label">Fuente de financiación</label>
            <select id="fuenteFinanciacion" class="form-select">
                <option value="">Seleccione una opción</option>
                <option value="Recursos Propios">Recursos Propios</option>
                <option value="RSE – Responsabilidad Social Empresarial">RSE – Responsabilidad Social Empresarial</option>
                <option value="Convenio">Convenio</option>
                <option value="Regalías directas">Regalías directas</option>
                <option value="Donación">Donación</option>
                <option value="Obras por impuestos">Obras por impuestos</option>
                <option value="Cooperación">Cooperación</option>
                <option value="Gestión Social">Gestión Social</option>
                <option value="OCAD Paz">OCAD Paz</option>
            </select>
          </div>

          <div class="col-md-3">
            <label class="form-label">Fecha inicio</label>
            <input type="date" id="fechaInicio" class="form-control" />
          </div>

          <div class="col-md-3">
            <label class="form-label">Fecha fin</label>
            <input type="date" id="fechaFin" class="form-control" />
          </div>

          <div class="col-md-4">
            <label class="form-label">Estado</label>
            <select id="estado" class="form-select">
              <option value="planeacion">Planeación</option>
              <option value="ejecucion">Ejecución</option>
              <option value="finalizado">Finalizado</option>
            </select>
          </div>

          <div class="col-md-4">
            <label class="form-label">Cantidad municipios</label>
            <input type="number" id="cantidadMunicipios" class="form-control" min="0" />
          </div>

          <div class="col-md-4">
            <label class="form-label">Cantidad instituciones</label>
            <input type="number" id="cantidadIE" class="form-control" min="0" />
          </div>

          <div class="col-md-4">
            <label class="form-label">Cantidad sedes</label>
            <input type="number" id="cantidadSedes" class="form-control" min="0" />
          </div>

          <div class="col-md-4">
            <label class="form-label">Cantidad docentes</label>
            <input type="number" id="cantidadDocentes" class="form-control" min="0" />
          </div>

          <div class="col-md-4">
            <label class="form-label">Cantidad estudiantes</label>
            <input type="number" id="cantidadEstudiantes" class="form-control" min="0" />
          </div>

          <div class="col-12">
            <div id="mensajeProyecto" class="small"></div>
          </div>

          <div class="col-12">
            <button type="submit" class="btn btn-primary">Guardar proyecto</button>
          </div>
        </form>
      </div>

      <div class="card shadow-sm p-4">
        <h5 class="mb-3 text-brand">Listado de proyectos</h5>

        <div class="table-responsive">
          <table class="table table-bordered table-hover align-middle">
            <thead>
              <tr>
                <th>Nombre</th>
                <th>Cliente</th>
                <th>Estado</th>
                <th>Fecha inicio</th>
                <th>Fecha fin</th>
              </tr>
            </thead>
            <tbody id="tablaProyectos">
              <tr>
                <td colspan="5" class="text-center">Cargando proyectos...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/proyectos.js"></script>
</body>
</html>
