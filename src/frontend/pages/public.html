<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestión docente</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body class="bg-soft">

  <nav class="navbar navbar-expand-lg px-4 py-3 bg-white shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center gap-3" href="../home.html">
        <img src="../images/logo4rosado.png" alt="Aulas Amigas" class="logo-publico-navbar" />
      </a>

      <div class="d-flex gap-3">
        <a href="impacto.html" class="btn btn-secondary">Impacto</a>
        <a href="../index.html" class="btn btn-primary">Ingresar</a>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <div class="text-center mb-4">
      <h1 class="text-brand fw-bold">Gestión docente</h1>
      <p class="text-muted mb-0">
        Consulta tus certificados y diligencia tus encuestas con tu número de documento.
      </p>
    </div>

    <div class="card p-4 shadow-sm mb-4">
      <label class="form-label">Número de documento</label>
      <input type="text" id="numeroDocumento" class="form-control" />

      <button id="btnBuscar" class="btn btn-primary mt-3">
        Consultar
      </button>

      <div id="mensaje" class="mt-3 small"></div>
    </div>

    <div id="contenido" style="display:none">

      <div class="card p-4 shadow-sm mb-4">
        <h5 class="text-brand mb-3">Encuestas pendientes</h5>
        <div id="encuestasPendientes"></div>
      </div>

      <div class="card p-4 shadow-sm mb-4">
        <h5 class="text-brand mb-3">Encuestas respondidas</h5>
        <div id="encuestasDisponibles"></div>
      </div>

      <div class="card p-4 shadow-sm">
        <h5 class="text-brand mb-3">Certificados</h5>
        <div id="certificados"></div>
      </div>

    </div>
  </div>

  <script src="../js/public.js"></script>
</body>
</html>
