<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docentes</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>

  <nav class="navbar px-4 py-3" style="background-color: var(--color-primary);">
    <div class="d-flex align-items-center gap-3">
      <img
        src="../images/logo1morado.png"
        alt="Aulas Amigas"
        style="height:55px; object-fit: contain;"
      />
      <span class="text-white fw-bold">Plataforma de Trazabilidad</span>
    </div>

    <button class="btn btn-light btn-sm" onclick="logout()">Cerrar sesión</button>
  </nav>

  <div class="d-flex">
    <div class="p-3" style="width: 250px; background: var(--color-gray); min-height: 100vh;">
      <h6 class="text-brand fw-bold mb-3">Menú</h6>

      <a href="dashboard.html" class="sidebar-link">Dashboard</a>
      <a href="proyectos.html" class="sidebar-link">Proyectos</a>
      <a href="instituciones.html" class="sidebar-link">Instituciones</a>
      <a href="docentes.html" class="sidebar-link active">Docentes</a>
      <a href="asistencias.html" class="sidebar-link">Asistencias</a>
      <a href="encuestas.html" class="sidebar-link">Encuestas</a>
    </div>

    <div class="p-4 w-100">
      <h2 class="text-brand fw-bold mb-4">Gestión de docentes</h2>

      <div class="card shadow-sm p-4 mb-4">
        <h5 class="mb-3 text-brand">Registrar docente</h5>

        <form id="docenteForm" class="row g-3">
          <div class="col-md-2">
            <label class="form-label">Tipo documento</label>
            <select id="tipoDocumento" class="form-select" required>
              <option value="CC">CC</option>
              <option value="TI">TI</option>
              <option value="CE">CE</option>
              <option value="Pasaporte">Pasaporte</option>
            </select>
          </div>

          <div class="col-md-4">
            <label class="form-label">Número documento</label>
            <input type="text" id="numeroDocumento" class="form-control" required />
          </div>

          <div class="col-md-3">
            <label class="form-label">Nombres</label>
            <input type="text" id="nombres" class="form-control" required />
          </div>

          <div class="col-md-3">
            <label class="form-label">Apellidos</label>
            <input type="text" id="apellidos" class="form-control" required />
          </div>

          <div class="col-md-4">
            <label class="form-label">Correo</label>
            <input type="email" id="email" class="form-control" />
          </div>

          <div class="col-md-3">
            <label class="form-label">Teléfono</label>
            <input type="text" id="telefono" class="form-control" />
          </div>

          <div class="col-md-5">
            <label class="form-label">Institución</label>
            <select id="institucionId" class="form-select" required>
              <option value="">Cargando instituciones...</option>
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label">Proyecto</label>
            <select id="proyectoId" class="form-select" required>
              <option value="">Cargando proyectos...</option>
            </select>
          </div>

          <div class="col-md-2 d-flex align-items-end">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="activo" checked />
              <label class="form-check-label" for="activo">Activo</label>
            </div>
          </div>

          <div class="col-12">
            <div id="mensajeDocente" class="small"></div>
          </div>

          <div class="col-12">
            <button type="submit" class="btn btn-primary">Guardar docente</button>
          </div>
        </form>
      </div>

      <div class="card shadow-sm p-4">
        <h5 class="mb-3 text-brand">Listado de docentes</h5>

        <div class="table-responsive">
          <table class="table table-bordered table-hover align-middle">
            <thead>
              <tr>
                <th>Documento</th>
                <th>Nombre</th>
                <th>Correo</th>
                <th>Teléfono</th>
                <th>Institución</th>
                <th>Proyecto</th>
              </tr>
            </thead>
            <tbody id="tablaDocentes">
              <tr>
                <td colspan="6" class="text-center">Cargando docentes...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/docentes.js"></script>
</body>
</html>
